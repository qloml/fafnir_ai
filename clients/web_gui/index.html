<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAFNIR ONLINE</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="glass-panel">
        <h1 class="title">FAFNIR</h1>
        <div class="input-group">
            <label>Server URL</label>
            <input type="text" id="server-url" value="http://127.0.0.1:8765">
        </div>
        <div class="input-group">
            <label>Room ID</label>
            <input type="text" id="room-id" value="room1">
        </div>
        <div class="input-group">
            <label>Player Name</label>
            <input type="text" id="player-name" value="Human">
        </div>
        <button id="btn-join" class="btn primary">Join Game</button>
        <div id="login-status"></div>
    </div>

    <!-- Main Game UI -->
    <div id="game-layout" class="hidden">
        <div id="game-ui">
            
            <!-- Header Info -->
            <header class="game-header glass-panel">
                <div class="header-left">
                    <span id="phase-badge" class="badge">WAITING</span>
                    <span id="round-turn-info">Round: - | Turn: -</span>
                </div>
                <div id="status-message" class="status-msg">Waiting for players...</div>
            </header>

        <!-- Opponent Area -->
        <section id="opponent-area" class="player-area opponent glass-panel">
            <div class="player-info">
                <h2 id="opp-name-header"><span id="opp-name">Opponent</span> <span id="opp-crown" class="crown hidden">👑</span></h2>
                <div class="score-box">Score: <span id="opp-score">0</span></div>
            </div>
            <div class="player-status">
                <span id="opp-badge" class="status-badge waiting">Waiting</span>
                <div class="hand-count">Hand: <span id="opp-hand-count">0</span> stones</div>
            </div>
        </section>

            <!-- Center Area (Trash & Offer) -->
            <section class="center-area">
                <!-- Trash Board -->
                <div class="trash-board glass-panel">
                    <h3>Trash (Limit: 6)</h3>
                    <div id="trash-container" class="trash-grid">
                        <!-- Trash bars generated by JS -->
                    </div>
                </div>

                <div class="center-right-col">
                    <!-- Offer Board -->
                    <div class="offer-board glass-panel">
                        <h3>Current Offer</h3>
                        <div id="offer-stones" class="stones-container">
                            <!-- Offer stones generated by JS -->
                        </div>
                    </div>
                </div>
            </section>

        <!-- Player Area -->
        <section id="my-area" class="player-area myself glass-panel">
            <div class="player-info">
                <h2 id="my-name-header"><span id="my-name">You</span> <span id="my-crown" class="crown hidden">👑</span></h2>
                <div class="score-box">Score: <span id="my-score">0</span></div>
            </div>
            
            <div class="hand-section">
                <div class="hand-header">
                    <h3>Your Hand</h3>
                </div>
                <div id="my-hand" class="hand-grid">
                    <!-- Hand stones generated by JS -->
                </div>
            </div>

            <div class="action-panel">
                <div class="selected-stones-info">
                    Selected for Bid: <span id="selected-preview">-</span>
                </div>
                <div class="controls">
                    <button id="btn-submit" class="btn primary disabled">Submit Bid</button>
                    <button id="btn-next" class="btn secondary hidden">OK / Next</button>
                    <button id="btn-restart" class="btn danger hidden">Restart Game</button>
                </div>
                <div id="action-error" class="error-msg"></div>
            </div>
            </section>
        </div> <!-- end game-ui -->

        <!-- Game Log Panel -->
        <aside id="log-panel" class="glass-panel">
            <h3>Game Log</h3>
            <div id="log-container" class="log-messages">
                <!-- Logs appended by JS -->
            </div>
        </aside>
    </div> <!-- end game-layout -->

    <script src="app.js"></script>
</body>
</html>
